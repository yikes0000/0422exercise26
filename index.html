<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        .image-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 100%;
            margin-top: 50px;
        }

        /* no distortion */
        .img-left {
            width: 33%;
            height: 300px;
            border-radius: 18px;
            object-fit: cover;
            
            object-position: center bottom; 
        }

        /* border */
        .img-middle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
        
            border: 1px solid #000000; 
            box-sizing: border-box; 
        }

        /*  distortion */
        .img-right {
            width: 33%;
            height: 300px;
            object-fit: fill; 
        }
    </style>
</head>
<body>

    <div class="image-container">
        <img class="img-left" src="https://images.unsplash.com/photo-1511739001486-6bfe10ce785f?w=800" alt="鐵塔底部">
        
        <img class="img-middle" src="https://images.unsplash.com/photo-1682687220742-aba13b6e50ba?w=800" alt="圓形圖片">
        
        <img class="img-right" src="https://images.unsplash.com/photo-1511739001486-6bfe10ce785f?w=800" alt="變形鐵塔">
    </div>

</body>
</html>
